<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background radial gradient for warm depth -->
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2C271F" stop-opacity="1"/>
      <stop offset="100%" stop-color="#12100D" stop-opacity="1"/>
    </radialGradient>

    <!-- Green glow gradient for core -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#30C476" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#12693A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#12100D" stop-opacity="0"/>
    </radialGradient>

    <!-- Core dot gradient -->
    <radialGradient id="dotGrad" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#6EEEA8"/>
      <stop offset="100%" stop-color="#30C476"/>
    </radialGradient>

    <!-- Clip to rounded square -->
    <clipPath id="iconClip">
      <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>

    <!-- Ring glow filters -->
    <filter id="ringGlow1" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ringGlow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coreFilter" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotFilter" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="#12100D"/>
  
  <!-- Warm center bloom -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bgGlow)"/>

  <g clip-path="url(#iconClip)">

    <!-- cx=512, cy=464 (shifted up for wordmark) -->

    <!-- Ring 4 — outermost, barely visible -->
    <!-- Full circle minus gap at ~315° -->
    <circle cx="512" cy="464" r="268"
      fill="none"
      stroke="#30C476"
      stroke-width="2"
      stroke-opacity="0.15"
      stroke-dasharray="1638 60"
      stroke-dashoffset="-820"
    />

    <!-- Ring 3 -->
    <circle cx="512" cy="464" r="192"
      fill="none"
      stroke="#30C476"
      stroke-width="3"
      stroke-opacity="0.37"
      stroke-dasharray="1172 42"
      stroke-dashoffset="-590"
      filter="url(#ringGlow2)"
    />

    <!-- Ring 2 -->
    <circle cx="512" cy="464" r="118"
      fill="none"
      stroke="#30C476"
      stroke-width="4.5"
      stroke-opacity="0.7"
      stroke-dasharray="714 26"
      stroke-dashoffset="-358"
      filter="url(#ringGlow1)"
    />

    <!-- Ring 1 — innermost, boldest -->
    <circle cx="512" cy="464" r="52"
      fill="none"
      stroke="#30C476"
      stroke-width="6"
      stroke-opacity="1"
      stroke-dasharray="308 18"
      stroke-dashoffset="-155"
      filter="url(#ringGlow1)"
    />

    <!-- Core atmospheric glow -->
    <circle cx="512" cy="464" r="90" fill="url(#coreGlow)"/>

    <!-- Core dot — dark ring separator -->
    <circle cx="512" cy="464" r="26" fill="#1C1A16"/>
    <!-- Green fill -->
    <circle cx="512" cy="464" r="22" fill="url(#dotGrad)" filter="url(#dotFilter)"/>
    <!-- Bright inner -->
    <circle cx="512" cy="464" r="22" fill="#30C476"/>
    <circle cx="512" cy="464" r="12" fill="#6EEEA8"/>
    <!-- Specular highlight -->
    <ellipse cx="506" cy="455" rx="6" ry="5" fill="rgba(220,255,235,0.78)"/>

    <!-- Separator line -->
    <line x1="436" y1="756" x2="588" y2="756" stroke="#30C476" stroke-width="1" stroke-opacity="0.25"/>

    <!-- Green accent dot above wordmark -->
    <circle cx="512" cy="748" r="3" fill="#30C476" fill-opacity="0.5"/>

    <!-- Wordmark: Pulse -->
    <text
      x="512"
      y="812"
      font-family="Jura, -apple-system, 'Helvetica Neue', sans-serif"
      font-weight="300"
      font-size="82"
      fill="rgba(252,246,235,0.78)"
      text-anchor="middle"
      letter-spacing="4"
    >Pulse</text>

  </g>

  <!-- Inner border -->
  <rect x="13" y="13" width="998" height="998" rx="208" ry="208"
    fill="none" stroke="rgba(128,120,106,0.07)" stroke-width="1"/>

</svg>
